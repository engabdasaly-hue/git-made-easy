# This is a basic workflow that is manually triggered

name: 020-manual-input-workflow

# Controls when the action will run. Workflow runs when manually triggered using the UI Or API.
on:
  workflow_dispatch:
    #inputs the workflow accepts
    inputs:
      name:
        #Friendly description to be shown in the UI instead of 'name'
        description: 'Person to greet'
        # Default value if no value is explicitly provided
        default: 'World'
        #Input has to be provided for the workflow to run
        required: true
        
# A workflow run is made up of one of more jobs that can run sequentially or in parallel
jobs:
  #This workflox contains a single job called "greet"
  greet:
  #The type of runner that the job will run on
    runs-on: ubuntu-latest

  # steps represent a sequence of tasks that will be executed as part of the job
    steps:
      #runs a single command using the runner shell
      - name: Send Greeting
        run: echo "Hello, ${{ github.event.inputs.name}}"
  
